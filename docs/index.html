<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Exam-Web Documentation</title>

  <!-- Redirección por idioma -->
  <script>
    (function () {
      var lang = navigator.language || navigator.userLanguage;
      lang = lang.toLowerCase();

      if (lang.startsWith("es")) {
        window.location.replace("index_es.html");
      } else {
        window.location.replace("index_en.html");
      }
    })();
  </script>

  <!-- Fallback si JS está desactivado -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=index_en.html">
  </noscript>
</head>

<body>
  <p>Redirecting…</p>
  <p>
    <a href="index_es.html">Español</a> |
    <a href="index_en.html">English</a>
  </p>
</body>
</html>
